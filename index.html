            align-items: center;
        }

            transition: all 0.2s;
        }
        body.dark-mode .search-container { background: #1e293b; }
        .search-container input {
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            width: 140px;
            background: transparent;
            outline: none;
            font-size: 0.75rem;
        }
        .search-container button {
            background: #d4af37;
            color: #1e293b;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

            position: relative;
            display: none;
        }
        .globe-lang-container.active {
            display: block;
        }
        .globe-icon {

            backdrop-filter: none;
            border: none;

            height: 38px;

            top: 45px;
            right: 0;
            background: white;
            border-radius: 20px;

            flex-direction: column;
            overflow: hidden;

        .lang-dropdown button {
            background: none;
            border: none;
            padding: 10px 18px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;

            left: 20px;

            background: #1e3c2c; 
            border: none; 
            font-size: 1.2rem;

            color: white;

            height: 42px;

        .sidebar.open { left: 0; }
        .sidebar .close-sidebar {

            background: none; border: none; font-size: 1.4rem;
            cursor: pointer; border-radius: 50%; padding: 8px;

            border-radius: 0 0 32px 32px;
            margin-bottom: 20px;

        .slider-container {
            position: relative;
            width: 100%;
            height: 100%;

        .slide {

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateX(100%);
            transition: transform 0.6s ease-in-out, opacity 0.4s ease-in-out;
            z-index: 1;
        }
        .slide.active {
            opacity: 1;
            transform: translateX(0);
            z-index: 2;
        }
        .slide.exit-right { transform: translateX(100%); opacity: 0; }
        .slide.enter-left { transform: translateX(-100%); }
        .slide-overlay {
            background: linear-gradient(135deg, rgba(0,0,0,0.55), rgba(0,0,0,0.4));

            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;

            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
        }
        .slide-overlay p {

            max-width: 700px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        .slide-caption {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.65);
            color: white;
            padding: 10px;
            font-size: 0.9rem;
            z-index: 3;
            font-weight: 500;

        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 768px) {
            .hero { height: 50vh; min-height: 380px; }
            .slide-overlay h1 { font-size: 1.6rem; }
            .section-title { font-size: 1.4rem; }
        }
    </style>
</head>
