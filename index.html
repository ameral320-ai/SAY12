    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang][key]) el.innerText = translations[lang][key];

        // Update dynamic content that might have static labels (like buttons) - optional re-render
        renderWebsite(); // re-render to update cards texts if needed
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
        showToast(`Language switched to ${lang.toUpperCase()}`);
    }

    function showToast(msg, isErr=false) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.background = isErr ? '#b91c1c' : '#1e3c2c';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);

    function loadData() {
        const saved = localStorage.getItem("saf_persistent_data_v7");
        if (saved) foundationData = JSON.parse(saved);
        else saveData();
    }
    function saveData() { localStorage.setItem("saf_persistent_data_v7", JSON.stringify(foundationData)); }
    function fileToBase64(file) { return new Promise((resolve, reject) => { const r = new FileReader(); r.onload = () => resolve(r.result); r.onerror = reject; r.readAsDataURL(file); }); }

    let foundationData = {

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function highlightText(text) { if (!currentSearchTerm) return escapeHtml(text); const regex = new RegExp(`(${escapeRegex(currentSearchTerm)})`, 'gi'); return escapeHtml(text).replace(regex, '<span class="search-highlight">$1</span>'); }
    function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    function renderHeroSlider() {
        const container = document.getElementById('sliderContainer');
        if (!container) return;
        container.innerHTML = '';
        if (foundationData.sliderImages.length === 0) { container.innerHTML = `<div class="no-slider-message"><h2>📸 No Slides</h2></div>`; return; }
        foundationData.sliderImages.forEach((img, idx) => {
            const slide = document.createElement('div'); slide.className = 'slide';
            if (idx === 0) slide.classList.add('active');
            slide.style.backgroundImage = `url('${img.url}')`;
            slide.style.backgroundSize = 'cover'; slide.style.backgroundPosition = 'center';
            slide.innerHTML = `<div class="slide-overlay"><h1>${escapeHtml(foundationData.heroTitle)}</h1><p>${escapeHtml(foundationData.heroDesc)}</p></div><div class="slide-caption"><i>${escapeHtml(img.caption)}</i></div>${isAdminLoggedIn ? `<div style="position:absolute; top:20px; right:20px; z-index:15; gap:8px;"><button onclick="openEditSlide('${img.id}')" style="background:#d4af37;">Edit</button><button onclick="deleteSlide('${img.id}')" style="background:#b91c1c;">Delete</button></div>` : ''}`;
            container.appendChild(slide);
        });
        startSlider();
    }
    function startSlider() { if (slideInterval) clearInterval(slideInterval); if (foundationData.sliderImages.length <= 1) return; slideInterval = setInterval(() => { if (isTransitioning) return; isTransitioning = true; const slides = document.querySelectorAll('.slide'); if (slides.length === 0) return; const current = slides[currentSlideIndex]; current.classList.add('exit-right'); current.classList.remove('active'); const nextIdx = (currentSlideIndex + 1) % slides.length; const next = slides[nextIdx]; next.classList.add('enter-left'); setTimeout(() => { next.classList.remove('enter-left'); next.classList.add('active'); current.classList.remove('exit-right'); isTransitioning = false; currentSlideIndex = nextIdx; }, 600); }, 6000); }
    function deleteSlide(id) { if (confirm("Delete slide?")) { foundationData.sliderImages = foundationData.sliderImages.filter(i => i.id !== id); if (currentSlideIndex >= foundationData.sliderImages.length) currentSlideIndex = 0; renderHeroSlider(); saveData(); showToast("Slide deleted"); } }
    function openEditSlide(id) { const img = foundationData.sliderImages.find(i => i.id === id); showModal(`<h3>Edit Slide</h3><div class="input-group"><label>Image URL</label><input id="editUrl" value="${escapeHtml(img.url)}"></div><div class="input-group"><label>Caption</label><input id="editCaption" value="${escapeHtml(img.caption)}"></div><div class="file-upload-area"><label>Upload New: <input type="file" id="uploadImg" accept="image/*"></label></div><button id="saveBtn">Save</button><button id="closeBtn">Cancel</button>`, async () => { const file = document.getElementById('uploadImg').files[0]; if (file) img.url = await fileToBase64(file); else if (document.getElementById('editUrl').value) img.url = document.getElementById('editUrl').value; img.caption = document.getElementById('editCaption').value; renderHeroSlider(); saveData(); closeModal(); showToast("Slide updated"); }); }
    
    function renderWebsite() {
        renderHeroSlider();
        document.getElementById('featuresGrid').innerHTML = foundationData.features.map(f => `<div class="feature-card"><i class="fas ${f.icon}"></i><h3>${highlightText(f.title)}</h3><p>${highlightText(f.desc)}</p>${isAdminLoggedIn ? `<div><button class="edit-btn" onclick="openEditFeature('${f.id}')">Edit</button><button class="delete-btn" onclick="deleteItem('features','${f.id}')">Delete</button></div>` : ''}</div>`).join('');
        document.getElementById('coursesContainer').innerHTML = foundationData.courses.map(c => `<div class="course-card"><h3>${highlightText(c.title)}</h3><p>${highlightText(c.description)}</p>${isAdminLoggedIn ? `<div><button class="edit-btn" onclick="openEditCourse('${c.id}')">Edit</button><button class="delete-btn" onclick="deleteItem('courses','${c.id}')">Delete</button></div>` : ''}</div>`).join('');
        document.getElementById('documentsContainer').innerHTML = foundationData.documents.map(d => `<div class="document-card"><h3><i class="fas fa-file-pdf"></i> ${highlightText(d.title)}</h3><p>${highlightText(d.description)}</p>${d.fileData && d.fileData !== '#' ? `<a class="download-link" href="${d.fileData}" download>${translations[currentLang].download}</a>` : d.fileUrl !== '#' ? `<a class="download-link" href="${d.fileUrl}" target="_blank">View</a>` : '<span>No file</span>'}${isAdminLoggedIn ? `<div><button class="edit-btn" onclick="openEditDocument('${d.id}')">Edit</button><button class="delete-btn" onclick="deleteItem('documents','${d.id}')">Delete</button></div>` : ''}</div>`).join('');
        document.getElementById('newsContainer').innerHTML = foundationData.news.map(n => `<div class="news-card"><div class="news-header"><h3>${highlightText(n.title)}</h3><svg class="seven-star" viewBox="0 0 100 100" fill="red"><polygon points="50,5 61,35 95,35 68,53 79,85 50,67 21,85 32,53 5,35 39,35" fill="red"/></svg></div><small>${n.date}</small><p>${highlightText(n.content)}</p>${isAdminLoggedIn ? `<div><button class="edit-btn" onclick="openEditNews('${n.id}')">Edit</button><button class="delete-btn" onclick="deleteItem('news','${n.id}')">Delete</button></div>` : ''}</div>`).join('');
        document.getElementById('teachersContainer').innerHTML = foundationData.teacherWorks.map(item => { let mediaHtml = ''; if (item.type === 'link') mediaHtml = `<a class="file-link" href="${item.content}" target="_blank"><i class="fas fa-external-link-alt"></i> ${translations[currentLang].readMore}</a>`; else if (item.type === 'document') mediaHtml = `<a class="download-link" href="${item.fileData || item.content}" download>Download</a>`; return `<div class="teacher-card"><h3>📚 ${highlightText(item.title)}</h3><p><strong>${item.type}</strong></p><p>${highlightText(item.caption)}</p>${mediaHtml}${isAdminLoggedIn ? `<div><button class="edit-btn" onclick="openEditTeacher('${item.id}')">Edit</button><button class="delete-btn" onclick="deleteItem('teacherWorks','${item.id}')">Delete</button></div>` : ''}</div>`; }).join('');
        document.getElementById('aboutContent').innerHTML = `<p>${highlightText(foundationData.aboutText)}</p>${isAdminLoggedIn ? `<button class="edit-btn" onclick="openEditAbout()">Edit About</button>` : ''}`;
        document.getElementById('contactDetails').innerHTML = `<p><i class="fas fa-map-marker-alt"></i> ${escapeHtml(foundationData.contact.addressLine1)}<br>${escapeHtml(foundationData.contact.addressLine2)}<br>${escapeHtml(foundationData.contact.addressLine3)}</p><p><i class="fas fa-globe"></i> <a href="${foundationData.contact.website}" target="_blank">${foundationData.contact.website}</a></p><p><i class="fas fa-envelope"></i> <a href="mailto:${foundationData.contact.email}">${foundationData.contact.email}</a></p><p><i class="fas fa-phone-alt"></i> ${foundationData.contact.phone}</p>${isAdminLoggedIn ? `<button class="edit-btn" onclick="openEditContact()">Edit Contact</button>` : ''}`;
        if (isAdminLoggedIn) addAdminButtons(); else removeAdminButtons();
        saveData();
    }
    // Admin helpers (simplified)
    function openEditFeature(id) { const item = foundationData.features.find(i=>i.id===id); showModal(`<h3>Edit Feature</h3><div><label>Icon</label><input id="editIcon" value="${item.icon}"></div><div><label>Title</label><input id="editTitle" value="${escapeHtml(item.title)}"></div><div><label>Desc</label><textarea id="editDesc">${escapeHtml(item.desc)}</textarea></div><button id="saveBtn">Save</button>`, ()=>{ item.icon=document.getElementById('editIcon').value; item.title=document.getElementById('editTitle').value; item.desc=document.getElementById('editDesc').value; renderWebsite(); closeModal(); }); }
    function openEditCourse(id) { const item = foundationData.courses.find(i=>i.id===id); showModal(`<h3>Edit Course</h3><div><label>Title</label><input id="editTitle" value="${escapeHtml(item.title)}"></div><div><label>Description</label><textarea id="editDesc">${escapeHtml(item.description)}</textarea></div><button id="saveBtn">Save</button>`, ()=>{ item.title=document.getElementById('editTitle').value; item.description=document.getElementById('editDesc').value; renderWebsite(); closeModal(); }); }
    function openEditDocument(id) { const item = foundationData.documents.find(i=>i.id===id); showModal(`<h3>Edit Document</h3><div><label>Title</label><input id="editTitle" value="${escapeHtml(item.title)}"></div><div><label>Description</label><textarea id="editDesc">${escapeHtml(item.description)}</textarea></div><div class="file-upload-area"><label>Replace File:<input type="file" id="uploadFile"></label></div><button id="saveBtn">Save</button>`, async ()=>{ const file=document.getElementById('uploadFile').files[0]; if(file) item.fileData = await fileToBase64(file); item.title=document.getElementById('editTitle').value; item.description=document.getElementById('editDesc').value; renderWebsite(); closeModal(); }); }
    function openEditNews(id) { const item = foundationData.news.find(i=>i.id===id); showModal(`<h3>Edit News</h3><div><label>Title</label><input id="editTitle" value="${escapeHtml(item.title)}"></div><div><label>Content</label><textarea id="editContent">${escapeHtml(item.content)}</textarea></div><div><label>Date</label><input type="date" id="editDate" value="${item.date}"></div><button id="saveBtn">Save</button>`, ()=>{ item.title=document.getElementById('editTitle').value; item.content=document.getElementById('editContent').value; item.date=document.getElementById('editDate').value; renderWebsite(); closeModal(); }); }
    function openEditTeacher(id) { const item = foundationData.teacherWorks.find(i=>i.id===id); showModal(`<h3>Edit Resource</h3><div><label>Title</label><input id="editTitle" value="${escapeHtml(item.title)}"></div><div><label>Type</label><select id="editType"><option ${item.type==='link'?'selected':''}>link</option><option ${item.type==='document'?'selected':''}>document</option></select></div><div><label>URL/Content</label><input id="editContent" value="${escapeHtml(item.content)}"></div><div><label>Caption</label><input id="editCaption" value="${escapeHtml(item.caption)}"></div><button id="saveBtn">Save</button>`, ()=>{ item.title=document.getElementById('editTitle').value; item.type=document.getElementById('editType').value; item.content=document.getElementById('editContent').value; item.caption=document.getElementById('editCaption').value; renderWebsite(); closeModal(); }); }
    function openEditAbout() { showModal(`<h3>Edit About</h3><textarea id="editAbout" rows="6">${escapeHtml(foundationData.aboutText)}</textarea><button id="saveBtn">Save</button>`, ()=>{ foundationData.aboutText=document.getElementById('editAbout').value; renderWebsite(); closeModal(); }); }
    function openEditContact() { showModal(`<h3>Edit Contact</h3><div><label>Address1</label><input id="editAddr1" value="${escapeHtml(foundationData.contact.addressLine1)}"></div><div><label>Address2</label><input id="editAddr2" value="${escapeHtml(foundationData.contact.addressLine2)}"></div><div><label>Address3</label><input id="editAddr3" value="${escapeHtml(foundationData.contact.addressLine3)}"></div><div><label>Website</label><input id="editWeb" value="${escapeHtml(foundationData.contact.website)}"></div><div><label>Email</label><input id="editEmail" value="${escapeHtml(foundationData.contact.email)}"></div><div><label>Phone</label><input id="editPhone" value="${escapeHtml(foundationData.contact.phone)}"></div><button id="saveBtn">Save</button>`, ()=>{ foundationData.contact.addressLine1=document.getElementById('editAddr1').value; foundationData.contact.addressLine2=document.getElementById('editAddr2').value; foundationData.contact.addressLine3=document.getElementById('editAddr3').value; foundationData.contact.website=document.getElementById('editWeb').value; foundationData.contact.email=document.getElementById('editEmail').value; foundationData.contact.phone=document.getElementById('editPhone').value; renderWebsite(); closeModal(); }); }
    function deleteItem(collection, id) { if(confirm("Delete?")){ foundationData[collection]=foundationData[collection].filter(i=>i.id!==id); renderWebsite(); showToast("Deleted"); } }
    function addAdminButtons() { if(document.getElementById('globalAdminPanel')) return; const container = document.querySelector('.page-content.active-page .container'); if(container){ const panel = document.createElement('div'); panel.id='globalAdminPanel'; panel.className='admin-actions'; panel.innerHTML=`<button id="addSlideBtn">+ Add Slide</button><button id="addFeatureBtn">+ Feature</button><button id="addCourseBtn">+ Course</button><button id="addDocBtn">+ Document</button><button id="addNewsBtn">+ News</button><button id="addTeacherBtn">+ Resource</button>`; container.insertBefore(panel, container.firstChild); document.getElementById('addSlideBtn')?.addEventListener('click', ()=> showModal(`<h3>Add Slide</h3><div><label>URL</label><input id="newUrl"></div><div><label>Caption</label><input id="newCaption"></div><button id="saveBtn">Add</button>`, async ()=>{ let url=document.getElementById('newUrl').value; if(!url)return alert("URL required"); foundationData.sliderImages.push({id:"s"+Date.now(), url, caption:document.getElementById('newCaption').value}); renderHeroSlider(); saveData(); closeModal(); })); document.getElementById('addFeatureBtn')?.addEventListener('click', ()=> addGenericItem('feature')); document.getElementById('addCourseBtn')?.addEventListener('click', ()=> addGenericItem('course')); document.getElementById('addDocBtn')?.addEventListener('click', ()=> addGenericItem('document')); document.getElementById('addNewsBtn')?.addEventListener('click', ()=> addGenericItem('news')); document.getElementById('addTeacherBtn')?.addEventListener('click', ()=> addGenericItem('teacher')); } }
    function addGenericItem(type) { if(type==='feature') showModal(`<h3>Add Feature</h3><div><label>Icon</label><input id="newIcon" value="fa-star"></div><div><label>Title</label><input id="newTitle"></div><div><label>Desc</label><textarea id="newDesc"></textarea></div><button id="saveBtn">Add</button>`, ()=>{ foundationData.features.push({id:"f"+Date.now(), icon:document.getElementById('newIcon').value, title:document.getElementById('newTitle').value, desc:document.getElementById('newDesc').value}); renderWebsite(); closeModal(); }); if(type==='course') showModal(`<h3>Add Course</h3><div><label>Title</label><input id="newTitle"></div><div><label>Description</label><textarea id="newDesc"></textarea></div><button id="saveBtn">Add</button>`, ()=>{ foundationData.courses.push({id:"c"+Date.now(), title:document.getElementById('newTitle').value, description:document.getElementById('newDesc').value}); renderWebsite(); closeModal(); }); if(type==='document') showModal(`<h3>Add Document</h3><div><label>Title</label><input id="newTitle"></div><div><label>Description</label><textarea id="newDesc"></textarea></div><div class="file-upload"><label>File:<input type="file" id="docFile"></label></div><button id="saveBtn">Add</button>`, async ()=>{ const file=document.getElementById('docFile').files[0]; if(!file) return; const b64=await fileToBase64(file); foundationData.documents.push({id:"d"+Date.now(), title:document.getElementById('newTitle').value||file.name, description:document.getElementById('newDesc').value, fileUrl:b64, fileData:b64}); renderWebsite(); closeModal(); }); if(type==='news') showModal(`<h3>Add News</h3><div><label>Title</label><input id="newTitle"></div><div><label>Content</label><textarea id="newContent"></textarea></div><div><label>Date</label><input type="date" id="newDate"></div><button id="saveBtn">Add</button>`, ()=>{ foundationData.news.push({id:"n"+Date.now(), title:document.getElementById('newTitle').value, content:document.getElementById('newContent').value, date:document.getElementById('newDate').value||new Date().toISOString().slice(0,10)}); renderWebsite(); closeModal(); }); if(type==='teacher') showModal(`<h3>Add Resource</h3><div><label>Title</label><input id="newTitle"></div><div><label>Type</label><select id="newType"><option>link</option><option>document</option></select></div><div><label>URL/Content</label><input id="newContent"></div><div><label>Caption</label><input id="newCaption"></div><button id="saveBtn">Add</button>`, ()=>{ foundationData.teacherWorks.push({id:"t"+Date.now(), title:document.getElementById('newTitle').value, type:document.getElementById('newType').value, content:document.getElementById('newContent').value, caption:document.getElementById('newCaption').value}); renderWebsite(); closeModal(); }); }
    function removeAdminButtons() { const p = document.getElementById('globalAdminPanel'); if(p) p.remove(); }
    function showModal(html, onSave) { const modal = document.getElementById('editorModal'); document.getElementById('editorModalContent').innerHTML = html; modal.style.display = 'flex'; document.getElementById('saveBtn')?.addEventListener('click', onSave); document.getElementById('closeBtn')?.addEventListener('click', closeModal); }
    function closeModal() { document.getElementById('editorModal').style.display = 'none'; }
    function performSearch() { currentSearchTerm = document.getElementById('searchInput').value.trim(); renderWebsite(); if(currentSearchTerm){ let found = false; const all = [...foundationData.courses, ...foundationData.news, ...foundationData.documents, ...foundationData.teacherWorks, ...foundationData.features]; if(all.some(i=>i.title?.toLowerCase().includes(currentSearchTerm.toLowerCase()) || i.description?.toLowerCase().includes(currentSearchTerm.toLowerCase()) || i.content?.toLowerCase().includes(currentSearchTerm.toLowerCase()))) found=true; if(!found) alert("No results"); } }
    function switchTab(tabId) { document.querySelectorAll('.page-content').forEach(p=>p.classList.remove('active-page')); document.getElementById(`${tabId}-page`).classList.add('active-page'); document.querySelectorAll('.sidebar .nav-tab').forEach(t=>t.classList.remove('active')); document.querySelector(`.sidebar .nav-tab[data-tab="${tabId}"]`)?.classList.add('active'); if(isAdminLoggedIn){ removeAdminButtons(); addAdminButtons(); } closeSidebar(); }
    function updateUserStatus() { document.getElementById('userStatus').innerHTML = isAdminLoggedIn ? `<span class="admin-badge-small"><i class="fas fa-crown"></i> Admin</span>` : ''; }
    function performAdminLogin() { const email = document.getElementById('adminEmail').value, pwd = document.getElementById('adminPassword').value; if(email===ADMIN_EMAIL && pwd===ADMIN_PASSWORD){ isAdminLoggedIn=true; document.getElementById('adminModal').style.display='none'; updateUserStatus(); renderWebsite(); showToast("Admin mode ON"); } else { document.getElementById('adminLoginError').innerText="Invalid credentials"; } }
    function logoutAdmin() { isAdminLoggedIn=false; updateUserStatus(); renderWebsite(); showToast("Admin mode OFF"); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('active'); }
    function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('active'); }
    document.getElementById('hamburgerBtn')?.addEventListener('click', openSidebar);
    document.getElementById('closeSidebar')?.addEventListener('click', closeSidebar);
    document.getElementById('sidebarOverlay')?.addEventListener('click', closeSidebar);
    document.getElementById('adminPortalBtn')?.addEventListener('click', ()=>document.getElementById('adminModal').style.display='flex');
    document.getElementById('adminLoginBtn')?.addEventListener('click', performAdminLogin);
    document.getElementById('cancelAdminBtn')?.addEventListener('click', ()=>document.getElementById('adminModal').style.display='none');
    document.querySelectorAll('.sidebar .nav-tab').forEach(tab=>tab.addEventListener('click', ()=>{ switchTab(tab.getAttribute('data-tab')); }));
    document.getElementById('searchBtn')?.addEventListener('click', performSearch);
    document.getElementById('searchInput')?.addEventListener('keypress', e=>{ if(e.key==='Enter') performSearch(); });
    document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeSidebar(); if(document.getElementById('adminModal').style.display==='flex') document.getElementById('adminModal').style.display='none'; if(document.getElementById('editorModal').style.display==='flex') closeModal(); } });
    document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang'))));
    
    loadData(); renderWebsite(); updateUserStatus(); setLanguage('en');
</script>
</body>
</html>
