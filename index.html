    function updateDynamicContent() {

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function highlightText(text) { if (!currentSearchTerm) return escapeHtml(text); const regex = new RegExp(`(${escapeRegex(currentSearchTerm)})`, 'gi'); return escapeHtml(text).replace(regex, '<span class="search-highlight">$1</span>'); }
    function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    function renderHeroSlider() {
        const container = document.getElementById('sliderContainer'); if (!container) return; container.innerHTML = '';
        if (foundationData.sliderImages.length === 0) { container.innerHTML = `<div class="no-slider-message"><h2>📸 Slides will appear here</h2></div>`; return; }
        foundationData.sliderImages.forEach((img, idx) => {
            const slide = document.createElement('div'); slide.className = 'slide'; if (idx === 0) slide.classList.add('active');
            slide.style.backgroundImage = `url('${img.url}')`; slide.style.backgroundSize = 'cover'; slide.style.backgroundPosition = 'center 30%';
            slide.innerHTML = `<div class="slide-overlay"><h1>${escapeHtml(foundationData.heroTitle)}</h1><p>${escapeHtml(foundationData.heroDesc)}</p></div><div class="slide-caption"><i class="fas fa-camera"></i> ${escapeHtml(img.caption)}</div>`;
            container.appendChild(slide);
        });
        startSlider();
    }
    
    function startSlider() { if (slideInterval) clearInterval(slideInterval); if (foundationData.sliderImages.length <= 1) return; slideInterval = setInterval(() => { if (isTransitioning) return; isTransitioning = true; const slides = document.querySelectorAll('.slide'); if (slides.length === 0) return; const current = slides[currentSlideIndex]; current.classList.add('exit-right'); current.classList.remove('active'); const nextIdx = (currentSlideIndex + 1) % slides.length; const next = slides[nextIdx]; next.classList.add('enter-left'); setTimeout(() => { next.classList.remove('enter-left'); next.classList.add('active'); current.classList.remove('exit-right'); isTransitioning = false; currentSlideIndex = nextIdx; }, 550); }, 5000); }

    function renderWebsite() {

        document.getElementById('teachersContainer').innerHTML = foundationData.teacherWorks.map(item => `<div class="teacher-card"><h3>👩‍🏫 ${item.teacher}</h3><h4>📘 ${highlightText(item.title)}</h4><a onclick="openLink('${item.content}')"><i class="fas fa-external-link-alt"></i> ${translations[currentLang].readMore}</a></div>`).join('');
        document.getElementById('aboutContent').innerHTML = `<p>${highlightText(foundationData.aboutText)}</p>`;
        document.getElementById('contactDetails').innerHTML = `<p><i class="fas fa-map-marker-alt"></i> ${escapeHtml(foundationData.contact.addressLine1)}<br>${escapeHtml(foundationData.contact.addressLine2)}<br>${escapeHtml(foundationData.contact.addressLine3)}</p><p><i class="fas fa-globe"></i> <a href="${foundationData.contact.website}" target="_blank">${foundationData.contact.website}</a></p><p><i class="fas fa-envelope"></i> <a href="mailto:${foundationData.contact.email}">${foundationData.contact.email}</a></p><p><i class="fas fa-phone-alt"></i> ${foundationData.contact.phone}</p>`;
        saveData();

    function performSearch() { currentSearchTerm = document.getElementById('searchInput').value.trim(); renderWebsite(); if(currentSearchTerm){ let found = false; const all = [...foundationData.courses, ...foundationData.news, ...foundationData.documents, ...foundationData.teacherWorks, ...foundationData.features]; if(all.some(i=>i.title?.toLowerCase().includes(currentSearchTerm.toLowerCase()) || i.description?.toLowerCase().includes(currentSearchTerm.toLowerCase()) || i.content?.toLowerCase().includes(currentSearchTerm.toLowerCase()))) found=true; if(!found) alert("No results found"); } }
    
    function switchTab(tabId) { 
        document.querySelectorAll('.page-content').forEach(p=>p.classList.remove('active-page')); 
        document.getElementById(`${tabId}-page`).classList.add('active-page'); 
        document.querySelectorAll('.sidebar .nav-tab').forEach(t=>t.classList.remove('active')); 
        document.querySelector(`.sidebar .nav-tab[data-tab="${tabId}"]`)?.classList.add('active'); 
        closeSidebar();
        const searchContainer = document.getElementById('searchContainer'), globeContainer = document.getElementById('globeLangContainer');
        if (tabId === 'home') { searchContainer.classList.remove('hidden'); globeContainer.classList.add('active'); } 
        else { searchContainer.classList.add('hidden'); globeContainer.classList.remove('active'); }
    }
    
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('active'); }
    function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('active'); }

    document.getElementById('sidebarOverlay')?.addEventListener('click', closeSidebar);
